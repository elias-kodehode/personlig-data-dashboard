<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./src/app.js"></script>
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <label
        >Sort by
        <select id="sort-by">
          <option value="default">Default</option>
          <option value="playtime-high">Playtime ▲</option>
          <option value="playtime-low">Playtime ▼</option>
          <option value="rating-high">Rating ▲</option>
          <option value="rating-low">Rating ▼</option>
          <option value="alphabetical">A-Z</option>
          <option value="alphabetical-reverse">Z-A</option>
        </select>
      </label>
      <p id="total-playtime">Total Playtime:</p>
      <button id="openBtn">Create Review</button>

      <button id="delete-all-btn">Delete All</button>
    </header>
  </body>

  <div class="grid"></div>

  <template id="review-card-template">
    <div class="review-card">
      <div class="review-card-header">
        <h3 data-title class="game-title">Title</h3>
        <div data-playtime class="game-playtime">
          <p>20 hours</p>
        </div>
        <p data-rating class="game-rating">8/10</p>
      </div>

      <div class="review-card-body">
        <div data-review class="game-review">
          <p>
            Lorem ipsum dolor sit amet consectetur, adipisicing elit.
            Consequuntur nihil eaque aliquam facere architecto aut adipisci
            beatae id maxime. Et?
          </p>
        </div>
      </div>

      <div class="review-card-buttons">
        <button class="edit-review-btn">Edit</button>
        <button class="delete-review-btn">Delete</button>
      </div>
    </div>
  </template>
  <dialog class="modal" id="create-modal">
    <div class="container">
      <h2>Create Review</h2>

      <div class="modal-field">
        <label for="game-title">Game Title: </label>
        <input data-game-title id="game-title" />
      </div>

      <div class="modal-field">
        <label for="game-playtime">Playtime(hrs): </label>
        <input data-game-playtime type="number" min="1" id="game-playtime" />
      </div>

      <div class="modal-field">
        <label for="game-rating">Rating out of 10 </label>
        <input
          data-game-rating
          type="number"
          min="0"
          max="10"
          id="game-rating"
        />
      </div>
      <div class="modal-field">
        <label for="game-review">Game Review: </label>
        <textarea data-game-review id="game-review"></textarea>
      </div>

      <span>
        <button id="create-close-btn">Close</button>
        <button id="create-save-btn">Save</button>
      </span>
    </div>
  </dialog>

  <dialog class="modal" id="edit-modal">
    <div class="container">
      <h2>Edit Review</h2>

      <div class="modal-field">
        <label for="game-title">Game Title: </label>
        <input data-game-title id="game-title" />
      </div>

      <div class="modal-field">
        <label for="game-playtime">Playtime(hrs): </label>
        <input data-game-playtime type="number" min="0" id="game-playtime" />
      </div>

      <div class="modal-field">
        <label for="game-rating">Rating out of 10 </label>
        <input
          data-game-rating
          type="number"
          min="0"
          max="10"
          id="game-rating"
        />
      </div>
      <div class="modal-field">
        <label for="game-review">Game Review: </label>
        <textarea data-game-review id="game-review"></textarea>
      </div>

      <span>
        <button id="edit-close-btn">Close</button>
        <button id="edit-save-btn">Save</button>
      </span>
    </div>
  </dialog>
</html>
