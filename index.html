<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./src/app.js"></script>
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <label
        >Sort by
        <select id="sort-by">
          <option value="default">Default</option>
          <option value="playtime-high">Playtime ▲</option>
          <option value="playtime-low">Playtime ▼</option>
          <option value="rating-high">Rating ▲</option>
          <option value="rating-low">Rating ▼</option>
          <option value="alphabetical">A-Z</option>
          <option value="alphabetical-reverse">Z-A</option>
        </select>
      </label>
      <p id="total-playtime">Total Playtime:</p>

      <span class="pill">
        <button id="create-review-btn">Create Review</button>

        <button id="delete-all-btn">Delete All</button>
      </span>
    </header>
    <main>
      <div class="grid"></div>
    </main>
  </body>

  <template id="review-card-template">
    <div class="review-card">
      <div class="review-card-header">
        <h3 data-title class="game-title">Title</h3>
        <div data-playtime class="game-playtime">
          <p>20 hours</p>
        </div>
        <p data-rating class="game-rating">8/10</p>
      </div>

      <div class="review-card-body">
        <p data-review class="game-review">
          Lorem ipsum dolor sit amet consectetur, adipisicing elit. Consequuntur
          nihil eaque aliquam facere architecto aut adipisci beatae id maxime.
          Et?
        </p>
      </div>

      <div class="review-card-buttons pill">
        <button class="edit-review-btn btn-grow">Edit</button>
        <button class="delete-review-btn">Delete</button>
      </div>
    </div>
  </template>

  <dialog class="modal" id="review-modal">
    <form class="container" id="review-form">
      <h2 id="modal-header">Create Review</h2>

      <div class="modal-field">
        <label
          >Game Title:
          <input data-game-title required />
        </label>
      </div>

      <div class="modal-field">
        <label
          >Playtime(hrs):
          <input data-game-playtime type="number" min="1" required />
        </label>
      </div>

      <div class="modal-field">
        <label
          >Rating out of 10
          <input data-game-rating type="number" min="0" max="10" required />
        </label>
      </div>

      <div class="modal-field">
        <label
          >Game Review:
          <textarea data-game-review required></textarea>
        </label>
      </div>

      <menu class="pill">
        <button type="submit" class="btn-grow">Save</button>
        <button type="button" data-close-button>Close</button>
      </menu>
    </form>
  </dialog>
</html>
